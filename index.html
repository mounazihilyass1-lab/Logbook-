<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FlightLog Pro</title>

<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: "DM Sans", sans-serif;
  background: #0b0f17;
  color: #e6eefc;
}

header {
  padding: 20px;
  background: #111827;
  border-bottom: 1px solid #1f2937;
}

h1 {
  margin: 0;
  font-size: 20px;
  letter-spacing: 2px;
}

.container {
  padding: 20px;
}

.card {
  background: #111827;
  padding: 16px;
  border-radius: 12px;
  margin-bottom: 15px;
  border: 1px solid #1f2937;
}

input {
  width: 100%;
  margin: 5px 0;
  padding: 10px;
  border-radius: 8px;
  border: 1px solid #374151;
  background: #0b0f17;
  color: white;
}

button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border: none;
  border-radius: 8px;
  background: #3b82f6;
  color: white;
  font-weight: bold;
}

button:hover {
  background: #2563eb;
}

.flight {
  background: #0f172a;
  padding: 12px;
  margin: 8px 0;
  border-radius: 8px;
  border-left: 3px solid #3b82f6;
  font-family: "DM Mono";
  font-size: 13px;
}

.small {
  opacity: 0.7;
  font-size: 12px;
}
</style>

</head>

<body>

<header>
  <h1>✈️ FLIGHTLOG PRO</h1>
</header>

<div class="container">

  <div class="card">
    <input id="date" type="date">
    <input id="from" placeholder="Departure (ICAO)">
    <input id="to" placeholder="Arrival (ICAO)">
    <input id="hours" type="number" step="0.1" placeholder="Hours">

    <button onclick="addFlight()">+ ADD FLIGHT</button>
  </div>

  <div class="card">
    <h3>Logbook</h3>
    <div id="list"></div>
  </div>

</div>

<script>
let flights = JSON.parse(localStorage.getItem("flights")) || [];

function render() {
  const list = document.getElementById("list");
  list.innerHTML = "";

  flights.forEach((f, i) => {
    list.innerHTML += `
      <div class="flight">
        ${f.date} <br>
        ${f.from} → ${f.to} <br>
        <span class="small">${f.hours} hrs</span>
        <button onclick="del(${i})" style="background:#ef4444;margin-top:8px;">
          DELETE
        </button>
      </div>
    `;
  });

  localStorage.setItem("flights", JSON.stringify(flights));
}

function addFlight() {
  flights.unshift({
    date: document.getElementById("date").value,
    from: document.getElementById("from").value,
    to: document.getElementById("to").value,
    hours: document.getElementById("hours").value
  });

  render();
}

function del(i) {
  flights.splice(i, 1);
  render();
}

render();
</script>

</body>
</html>
