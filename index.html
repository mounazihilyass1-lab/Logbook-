<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>✈ Aviation Logbook</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
</head>

<body>

<header>✈ AVIATION LOGBOOK  bni qhban 🎖</header>

<div class="container">

<!-- INPUT PANEL -->
<div class="card">
  <input id="date" type="date">
  <input id="from" placeholder="Departure ICAO">
  <input id="to" placeholder="Arrival ICAO">
  <input id="hours" type="number" step="0.1" placeholder="Flight Hours">
  <input id="landings" type="number" placeholder="Landings">

  <select id="type">
    <option>PIC</option>
    <option>SIC</option>
    <option>DUAL</option>
  </select>

  <select id="rule">
    <option>VFR</option>
    <option>IFR</option>
  </select>

  <button onclick="addFlight()">➕ ADD FLIGHT</button>
</div>

<!-- STATS -->
<div class="grid">
  <div class="stat"><h2 id="total">0</h2><div>⏱ TOTAL</div></div>
  <div class="stat"><h2 id="pic">0</h2><div>🧑‍✈️ PIC</div></div>
  <div class="stat"><h2 id="ifr">0</h2><div>☁ IFR</div></div>
  <div class="stat"><h2 id="land">0</h2><div>🛬 LAND</div></div>
  <div class="stat"><h2 id="dist">0</h2><div>📍 KM</div></div>
</div>

<!-- MAP -->
<div class="card">
  <h3>🗺 Mission Map</h3>
  <div id="map"></div>
</div>

<!-- EXPORT -->
<div class="card">
  <button onclick="exportPDF()">📄 EXPORT PDF</button>
  <button onclick="exportJSON()">💾 EXPORT JSON</button>
  <input type="file" onchange="importJSON(event)">
</div>

<!-- LIST -->
<div class="card">
  <h3>✈ Flight Log</h3>
  <div id="list"></div>
</div>

</div>

<script src="app.js"></script>

</body>
</html>
