<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pilot Logbook Pro</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b0f17;
  color:white;
}

header{
  padding:16px;
  background:#111827;
  text-align:center;
  font-weight:bold;
}

.container{padding:15px;}

.card{
  background:#111827;
  padding:12px;
  border-radius:10px;
  margin-bottom:10px;
  border:1px solid #1f2937;
}

input,select,button{
  width:100%;
  padding:10px;
  margin:5px 0;
  border-radius:8px;
  border:none;
}

input,select{
  background:#0b0f17;
  color:white;
  border:1px solid #333;
}

button{
  background:#3b82f6;
  color:white;
  font-weight:bold;
}

.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

.stat{
  background:#0f172a;
  padding:10px;
  border-radius:10px;
  text-align:center;
}

.stat h2{margin:0;color:#3b82f6;}

.flight{
  background:#0f172a;
  padding:10px;
  margin:8px 0;
  border-radius:10px;
  font-size:12px;
  border-left:3px solid #3b82f6;
}

.small{font-size:11px;opacity:0.7}
</style>
</head>

<body>

<header>✈️ PROFESSIONAL PILOT LOGBOOK</header>

<div class="container">

<!-- INPUT -->
<div class="card">
  <input id="date" type="date">
  <input id="from" placeholder="DEP ICAO">
  <input id="to" placeholder="ARR ICAO">
  <input id="hours" type="number" step="0.1" placeholder="Flight Time">

  <input id="landings" type="number" placeholder="Landings">

  <select id="type">
    <option value="PIC">PIC</option>
    <option value="SIC">SIC</option>
    <option value="DUAL">DUAL</option>
  </select>

  <select id="rule">
    <option value="VFR">VFR</option>
    <option value="IFR">IFR</option>
  </select>

  <select id="night">
    <option value="DAY">DAY</option>
    <option value="NIGHT">NIGHT</option>
  </select>

  <button onclick="addFlight()">ADD FLIGHT</button>
</div>

<!-- STATS -->
<div class="grid">
  <div class="stat">
    <h2 id="total">0</h2>
    <div class="small">TOTAL</div>
  </div>

  <div class="stat">
    <h2 id="pic">0</h2>
    <div class="small">PIC</div>
  </div>

  <div class="stat">
    <h2 id="ifr">0</h2>
    <div class="small">IFR</div>
  </div>

  <div class="stat">
    <h2 id="land">0</h2>
    <div class="small">LANDINGS</div>
  </div>
</div>

<!-- FILTER -->
<div class="card">
  <input type="month" id="filter">
  <button onclick="applyFilter()">FILTER</button>
  <button onclick="resetFilter()">RESET</button>
</div>

<!-- EXPORT -->
<div class="card">
  <button onclick="exportJSON()">EXPORT JSON</button>
  <button onclick="exportPDF()">EXPORT PDF</button>
  <input type="file" id="fileInput">
</div>

<!-- LIST -->
<div class="card">
  <h3>LOGBOOK</h3>
  <div id="list"></div>
</div>

</div>

<script>

let flights = JSON.parse(localStorage.getItem("pilot_logbook")) || [];
let view = null;

// =====================
// ADD FLIGHT
// =====================
function addFlight(){
  flights.unshift({
    date:date.value,
    from:from.value.toUpperCase(),
    to:to.value.toUpperCase(),
    hours:parseFloat(hours.value),
    landings:parseInt(landings.value || 0),
    type:type.value,
    rule:rule.value,
    night:night.value
  });

  save();
  render();
}

// =====================
// SAVE
// =====================
function save(){
  localStorage.setItem("pilot_logbook", JSON.stringify(flights));
}

// =====================
// RENDER
// =====================
function render(data = flights){

  const list=document.getElementById("list");
  list.innerHTML="";

  let total=0,pic=0,ifr=0,land=0;

  data.forEach(f=>{
    total+=f.hours;
    land+=f.landings;

    if(f.type==="PIC") pic+=f.hours;
    if(f.rule==="IFR") ifr+=f.hours;

    list.innerHTML+=`
      <div class="flight">
        ${f.date} | ${f.from} → ${f.to}<br>
        ${f.hours}h | ${f.type} | ${f.rule} | ${f.night}<br>
        Landings: ${f.landings}
      </div>
    `;
  });

  totalEl().textContent=total.toFixed(1);
  picEl().textContent=pic.toFixed(1);
  ifrEl().textContent=ifr.toFixed(1);
  landEl().textContent=land;
}

// =====================
// STATS
// =====================
const totalEl=()=>document.getElementById("total");
const picEl=()=>document.getElementById("pic");
const ifrEl=()=>document.getElementById("ifr");
const landEl=()=>document.getElementById("land");

// =====================
// FILTER
// =====================
function applyFilter(){
  const val=filter.value;
  view=flights.filter(f=>f.date.startsWith(val));
  render(view);
}

function resetFilter(){
  view=null;
  filter.value="";
  render();
}

// =====================
// EXPORT JSON
// =====================
function exportJSON(){
  const blob=new Blob([JSON.stringify(flights,null,2)],{type:"application/json"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");
  a.href=url;
  a.download="pilot_logbook.json";
  a.click();
}

// =====================
// EXPORT PDF (simple)
// =====================
function exportPDF(){
  let text="PILOT LOGBOOK\n\n";

  flights.forEach(f=>{
    text+=`${f.date} ${f.from}-${f.to} ${f.hours}h ${f.type} ${f.rule} Landings:${f.landings}\n`;
  });

  const blob=new Blob([text],{type:"application/pdf"});
  const url=URL.createObjectURL(blob);

  const a=document.createElement("a");
  a.href=url;
  a.download="logbook.pdf";
  a.click();
}

// =====================
// IMPORT JSON
// =====================
fileInput.onchange=(e)=>{
  const r=new FileReader();
  r.onload=(ev)=>{
    flights=JSON.parse(ev.target.result);
    save();
    render();
  };
  r.readAsText(e.target.files[0]);
};

render();

</script>

</body>
</html>
