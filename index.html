<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Flight Logbook</title>
</head>
<body>

<h1>✈️ Pilot Logbook</h1>

<input id="date" type="date">
<input id="from" placeholder="From">
<input id="to" placeholder="To">
<input id="hours" type="number" step="0.1" placeholder="Hours">

<button onclick="addFlight()">Add Flight</button>

<h2>Flights</h2>
<ul id="list"></ul>

<script>
let flights = JSON.parse(localStorage.getItem("flights")) || [];

function render() {
  const list = document.getElementById("list");
  list.innerHTML = "";

  flights.forEach((f, i) => {
    list.innerHTML += `
      <li>
        ${f.date} | ${f.from} → ${f.to} | ${f.hours}h
        <button onclick="del(${i})">X</button>
      </li>
    `;
  });

  localStorage.setItem("flights", JSON.stringify(flights));
}

function addFlight() {
  flights.push({
    date: document.getElementById("date").value,
    from: document.getElementById("from").value,
    to: document.getElementById("to").value,
    hours: document.getElementById("hours").value
  });

  render();
}

function del(i) {
  flights.splice(i, 1);
  render();
}

render();
</script>

</body>
</html>
