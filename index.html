<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>My Flight Logbook</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<header>✈️ MY FLIGHT LOGBOOK</header>

<div class="container">

<!-- FORM -->
<div class="card">
  <input id="date" type="date">
  <input id="from" placeholder="From ICAO">
  <input id="to" placeholder="To ICAO">
  <input id="hours" type="number" step="0.1" placeholder="Hours">
  <input id="landings" type="number" placeholder="Landings">

  <select id="type">
    <option value="PIC">PIC</option>
    <option value="SIC">SIC</option>
    <option value="DUAL">DUAL</option>
  </select>

  <select id="rule">
    <option value="VFR">VFR</option>
    <option value="IFR">IFR</option>
  </select>

  <select id="night">
    <option value="DAY">DAY</option>
    <option value="NIGHT">NIGHT</option>
  </select>

  <button onclick="addFlight()">ADD FLIGHT</button>
</div>

<!-- STATS -->
<div class="grid">
  <div class="stat">
    <h2 id="total">0</h2>
    <div class="small">TOTAL</div>
  </div>

  <div class="stat">
    <h2 id="pic">0</h2>
    <div class="small">PIC</div>
  </div>

  <div class="stat">
    <h2 id="ifr">0</h2>
    <div class="small">IFR</div>
  </div>

  <div class="stat">
    <h2 id="land">0</h2>
    <div class="small">LANDINGS</div>
  </div>
</div>

<!-- FILTER -->
<div class="card">
  <input type="month" id="filterMonth">
  <button onclick="applyFilter()">FILTER</button>
  <button onclick="resetFilter()">RESET</button>
</div>

<!-- EXPORT -->
<div class="card">
  <button onclick="exportJSON()">EXPORT JSON</button>
  <button onclick="exportPDF()">EXPORT PDF</button>
  <input type="file" id="fileInput">
</div>

<!-- LIST -->
<div class="card">
  <h3>LOGBOOK</h3>
  <div id="list"></div>
</div>

</div>

<script src="app.js"></script>

</body>
</html>
