<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flight Logbook</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b0f17;
  color:white;
}

header{
  padding:15px;
  background:#111827;
}

.container{
  padding:15px;
}

.card{
  background:#111827;
  padding:12px;
  margin-bottom:12px;
  border-radius:10px;
}

input,button{
  width:100%;
  padding:10px;
  margin:5px 0;
  border-radius:8px;
  border:none;
}

input{
  background:#0b0f17;
  color:white;
  border:1px solid #333;
}

button{
  background:#3b82f6;
  color:white;
  font-weight:bold;
}

.flight{
  background:#0f172a;
  padding:10px;
  margin:8px 0;
  border-radius:8px;
  font-size:13px;
}

.small{
  opacity:0.7;
  font-size:12px;
}
</style>
</head>

<body>

<header>
  ✈️ FLIGHT LOGBOOK
</header>

<div class="container">

<div class="card">
  <input id="date" type="date">
  <input id="from" placeholder="From ICAO">
  <input id="to" placeholder="To ICAO">
  <input id="hours" type="number" step="0.1" placeholder="Hours">

  <button onclick="addFlight()">ADD FLIGHT</button>
</div>

<div class="card">
  <button onclick="downloadJSON()">EXPORT JSON</button>
  <input type="file" id="fileInput">
</div>

<div class="card">
  <h3>LOGBOOK</h3>
  <div id="list"></div>
</div>

</div>

<script>

// =====================
// DATA STORAGE (JSON)
// =====================

let flights = JSON.parse(localStorage.getItem("flights")) || [];

// =====================
// RENDER
// =====================

function render(){
  const list = document.getElementById("list");
  list.innerHTML = "";

  flights.forEach((f,i)=>{
    list.innerHTML += `
      <div class="flight">
        ${f.date}<br>
        ${f.from} → ${f.to}<br>
        <span class="small">${f.hours} hours</span>
        <button onclick="del(${i})" style="background:#ef4444;margin-top:6px;">
          DELETE
        </button>
      </div>
    `;
  });

  localStorage.setItem("flights", JSON.stringify(flights));
}

// =====================
// ADD FLIGHT
// =====================

function addFlight(){
  flights.unshift({
    date:date.value,
    from:from.value.toUpperCase(),
    to:to.value.toUpperCase(),
    hours:parseFloat(hours.value)
  });

  render();
}

// =====================
// DELETE
// =====================

function del(i){
  flights.splice(i,1);
  render();
}

// =====================
// EXPORT JSON FILE
// =====================

function downloadJSON(){
  const blob = new Blob([JSON.stringify(flights,null,2)],{
    type:"application/json"
  });

  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");

  a.href = url;
  a.download = "flights.json";
  a.click();

  URL.revokeObjectURL(url);
}

// =====================
// IMPORT JSON FILE
// =====================

document.getElementById("fileInput").addEventListener("change", function(e){
  const file = e.target.files[0];
  const reader = new FileReader();

  reader.onload = function(event){
    flights = JSON.parse(event.target.result);
    render();
  };

  reader.readAsText(file);
});

render();

</script>

</body>
</html>
